<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QuadraJá — Pagamento</title>
  <link rel="stylesheet" href="../css/shared.css"/>
  <link rel="stylesheet" href="../css/pagamento.css"/>
</head>
<body>
  <div class="page page-top">

    <div class="header fade-up">
      <button class="btn-back" onclick="window.location.href='horarios.html'">←</button>
      <div class="header-texts">
        <h2>Pagamento</h2>
        <p>Confirme e pague para reservar</p>
      </div>
    </div>

    <div class="screen pag-screen">

      <!-- Resumo compacto da reserva -->
      <div class="booking-summary fade-up-1">
        <div class="booking-icon">🏐</div>
        <div class="booking-details">
          <strong id="bookingTitle">Quadra A1 · Arena Centro</strong>
          <p id="bookingInfo">—</p>
          <span class="chip chip-green" id="bookingChip">Avulso</span>
        </div>
        <div class="booking-total">
          <span class="price-total" id="bookingPrice">R$ 80</span>
        </div>
      </div>

      <!-- Forma de pagamento -->
      <p class="section-label fade-up-2" style="margin-top:16px">Forma de pagamento</p>
      <div class="payment-methods fade-up-2" id="paymentMethods">
        <div class="payment-option active" data-method="pix">
          <div class="pm-icon">⚡</div>
          <div class="pm-info"><strong>PIX</strong><p>Aprovação instantânea</p></div>
          <div class="pm-check">✓</div>
        </div>
        <div class="payment-option" data-method="credit">
          <div class="pm-icon">💳</div>
          <div class="pm-info"><strong>Cartão de crédito</strong><p>Visa, Master, Elo</p></div>
          <div class="pm-check"></div>
        </div>
        <div class="payment-option" data-method="debit">
          <div class="pm-icon">🏦</div>
          <div class="pm-info"><strong>Cartão de débito</strong><p>Débito automático</p></div>
          <div class="pm-check"></div>
        </div>
      </div>

      <!-- PIX panel -->
      <div id="pixPanel" class="pix-panel fade-up-3">
        <div class="pix-qr">
          <svg width="100" height="100" viewBox="0 0 120 120" fill="none">
            <rect width="120" height="120" rx="8" fill="#0F1623"/>
            <rect x="8"  y="8"  width="30" height="30" rx="3" fill="#00E5A0"/>
            <rect x="12" y="12" width="22" height="22" rx="2" fill="#0F1623"/>
            <rect x="16" y="16" width="14" height="14" rx="1" fill="#00E5A0"/>
            <rect x="82" y="8"  width="30" height="30" rx="3" fill="#00E5A0"/>
            <rect x="86" y="12" width="22" height="22" rx="2" fill="#0F1623"/>
            <rect x="90" y="16" width="14" height="14" rx="1" fill="#00E5A0"/>
            <rect x="8"  y="82" width="30" height="30" rx="3" fill="#00E5A0"/>
            <rect x="12" y="86" width="22" height="22" rx="2" fill="#0F1623"/>
            <rect x="16" y="90" width="14" height="14" rx="1" fill="#00E5A0"/>
            <rect x="46" y="8"  width="6" height="6" rx="1" fill="#00E5A0"/>
            <rect x="56" y="8"  width="6" height="6" rx="1" fill="#00E5A0"/>
            <rect x="66" y="8"  width="6" height="6" rx="1" fill="#00E5A0"/>
            <rect x="46" y="46" width="6" height="6" rx="1" fill="#00E5A0"/>
            <rect x="56" y="56" width="6" height="6" rx="1" fill="#00E5A0"/>
            <rect x="66" y="46" width="6" height="6" rx="1" fill="#00E5A0"/>
            <rect x="76" y="56" width="6" height="6" rx="1" fill="#00E5A0"/>
            <rect x="96" y="46" width="6" height="6" rx="1" fill="#00E5A0"/>
            <rect x="56" y="76" width="6" height="6" rx="1" fill="#00E5A0"/>
            <rect x="76" y="86" width="6" height="6" rx="1" fill="#00E5A0"/>
            <rect x="96" y="96" width="6" height="6" rx="1" fill="#00E5A0"/>
            <rect x="46" y="96" width="6" height="6" rx="1" fill="#00E5A0"/>
            <rect x="66" y="106" width="6" height="6" rx="1" fill="#00E5A0"/>
          </svg>
          <p class="pix-expire">Expira em <span id="pixTimer" class="accent">14:59</span></p>
        </div>
        <button class="btn-secondary copy-btn" id="copyPixBtn">📋 Copiar código PIX</button>
      </div>

      <!-- Card panel -->
      <div id="cardPanel" style="display:none" class="card-panel fade-up-3">
        <div class="input-group">
          <label class="input-label">Número do cartão</label>
          <div class="input-wrap">
            <span class="icon">💳</span>
            <input type="text" id="cardNumber" placeholder="0000 0000 0000 0000" maxlength="19"/>
          </div>
        </div>
        <div style="display:flex;gap:10px">
          <div class="input-group" style="flex:1">
            <label class="input-label">Validade</label>
            <div class="input-wrap"><input type="text" id="cardExpiry" placeholder="MM/AA" maxlength="5"/></div>
          </div>
          <div class="input-group" style="flex:1">
            <label class="input-label">CVV</label>
            <div class="input-wrap"><input type="text" id="cardCvv" placeholder="000" maxlength="3"/></div>
          </div>
        </div>
        <div class="input-group">
          <label class="input-label">Nome no cartão</label>
          <div class="input-wrap"><input type="text" id="cardName" placeholder="SEU NOME"/></div>
        </div>
      </div>

      <button class="btn-primary fade-up-4" id="payBtn" style="margin-top:16px">
        Pagar →
      </button>
      <p class="pay-info">🔒 Pagamento 100% seguro · PCI certificado</p>

    </div>
  </div>
  <script src="../js/pagamento.js"></script>
</body>
</html>
