<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QuadraJá — Login</title>
  <link rel="stylesheet" href="../css/shared.css"/>
  <link rel="stylesheet" href="../css/login.css"/>
</head>
<body>
  <div class="phone">
    <!-- Status Bar -->
    <div class="status-bar">
      <span>9:41</span>
      <span class="status-icons">●●● 📶</span>
      <span>98%🔋</span>
    </div>

    <div class="screen login-screen">
      <!-- Logo -->
      <div class="login-logo fade-up">
        <img src="../assets/logo.svg" alt="QuadraJá" class="logo-img"/>
      </div>

      <!-- Welcome text -->
      <div class="login-welcome fade-up-1">
        <h1>Bem-vindo de volta 👋</h1>
        <p>Faça login para reservar sua quadra</p>
      </div>

      <!-- Form -->
      <form class="login-form fade-up-2" id="loginForm">
        <div class="input-group">
          <label class="input-label">E-mail</label>
          <div class="input-wrap">
            <span class="icon">✉️</span>
            <input type="email" id="email" placeholder="seu@email.com" autocomplete="email"/>
          </div>
        </div>

        <div class="input-group">
          <label class="input-label">Senha</label>
          <div class="input-wrap">
            <span class="icon">🔒</span>
            <input type="password" id="password" placeholder="••••••••" autocomplete="current-password"/>
            <button type="button" class="toggle-pw" id="togglePw" tabindex="-1">👁</button>
          </div>
        </div>

        <div class="forgot-row">
          <a href="#" class="accent forgot-link">Esqueci minha senha</a>
        </div>

        <button type="submit" class="btn-primary" id="loginBtn">
          Entrar
        </button>
      </form>

      <!-- Divider -->
      <div class="divider-label fade-up-3">
        <span>ou continue com</span>
      </div>

      <!-- OAuth -->
      <div class="oauth-row fade-up-4">
        <button class="btn-oauth" id="googleBtn">
          <img src="https://upload.wikimedia.org/wikipedia/commons/c/c1/Google_%22G%22_logo.svg" alt="Google" width="20" height="20"/>
          Google
        </button>
        <button class="btn-oauth" id="appleBtn">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><path d="M17.05 20.28c-.98.95-2.05.8-3.08.35-1.09-.46-2.09-.48-3.24 0-1.44.62-2.2.44-3.06-.35C2.79 15.25 3.51 7.7 9.05 7.42c1.27.07 2.15.64 2.9.69.96-.19 1.88-.79 3.07-.84 1.3-.06 2.48.51 3.21 1.38-2.99 1.77-2.53 5.76.46 6.89-.62 1.5-1.43 3.01-1.64 4.74zM12.03 7.25c-.15-2.23 1.66-4.07 3.74-4.25.29 2.58-2.34 4.5-3.74 4.25z"/></svg>
          Apple
        </button>
      </div>

      <!-- Sign up -->
      <p class="signup-row fade-up-5">
        Não tem conta?
        <a href="#" class="accent signup-link">Cadastre-se grátis</a>
      </p>
    </div>
  </div>

  <script src="../js/login.js"></script>
</body>
</html>
