<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QuadraJá — Confirmação</title>
  <link rel="stylesheet" href="../css/shared.css"/>
  <link rel="stylesheet" href="../css/confirmacao.css"/>
</head>
<body>
  <div class="page page-top">
    <div class="screen confirm-screen">

      <!-- Hero de sucesso -->
      <div class="success-hero">
        <div class="success-rings">
          <div class="ring ring-3"></div>
          <div class="ring ring-2"></div>
          <div class="ring ring-1"></div>
          <div class="success-icon">✓</div>
        </div>
        <h2 class="success-title">Reserva confirmada!</h2>
        <p class="success-sub">Seu jogo está garantido 🏐</p>
      </div>

      <!-- Código -->
      <div class="booking-code-card">
        <p class="section-label">Código da reserva</p>
        <div class="code-display">
          <span id="bookingCode">QJ-XXXX</span>
          <button class="copy-code-btn" id="copyCodeBtn" title="Copiar">📋</button>
        </div>
        <p class="code-hint">Apresente este código na recepção</p>
      </div>

      <!-- Detalhes -->
      <div class="confirm-details">
        <div class="confirm-row">
          <span class="confirm-icon">🏟</span>
          <div>
            <strong id="confArena">Arena Centro</strong>
            <p id="confQuadra">Quadra A1</p>
          </div>
        </div>
        <div class="divider"></div>
        <div class="confirm-row">
          <span class="confirm-icon">📅</span>
          <div>
            <strong id="confData">—</strong>
            <p id="confHorarios">—</p>
          </div>
        </div>
        <div class="divider"></div>
        <div class="confirm-row">
          <span class="confirm-icon">💰</span>
          <div>
            <strong id="confPreco">—</strong>
            <p>Pago via PIX · Aprovado agora</p>
          </div>
        </div>
        <div class="divider"></div>
        <div class="confirm-row">
          <span class="confirm-icon">📍</span>
          <div>
            <strong>Como chegar</strong>
            <p id="confEndereco">—</p>
          </div>
          <button class="btn-map" id="btnMapa">Mapa →</button>
        </div>
      </div>

      <!-- Banner de lembrete -->
      <div class="notif-banner">
        <span>🔔</span>
        <p>Você receberá um lembrete por SMS <strong>2 horas antes</strong> do jogo</p>
      </div>

      <!-- Ações -->
      <div class="confirm-actions">
        <button class="btn-primary" id="newReservationBtn">+ Nova reserva</button>
        <button class="btn-secondary" id="shareBtn">📤 Compartilhar</button>
      </div>

    </div>
  </div>

  <script src="../js/confirmacao.js"></script>
</body>
</html>
