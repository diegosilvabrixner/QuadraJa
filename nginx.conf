# /etc/nginx/sites-available/quadraja
# ou C:\nginx\conf\nginx.conf no Windows
#
# Uso: sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    # Coloque seu IP fixo ou domínio aqui
    server_name SEU_IP_FIXO_AQUI;
    # Exemplo: server_name 177.68.12.34;
    # Com domínio: server_name quadraja.com.br www.quadraja.com.br;

    # ── Frontend — arquivos estáticos ───────────────────────────
    location / {
        root   /caminho/para/quadraja/frontend;
        # Exemplo: /home/usuario/quadraja/frontend
        # Windows: root C:/quadraja/frontend;

        index  html/login.html;
        try_files $uri $uri/ /html/login.html;

        # Cache para assets estáticos
        location ~* \.(css|js|svg|png|jpg|ico|woff2)$ {
            expires 7d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ── Backend API — proxy reverso ─────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_cache_bypass $http_upgrade;

        # Timeout maior para operações longas
        proxy_read_timeout 60s;
    }

    # ── Webhooks (Mercado Pago etc.) ─────────────────────────────
    location /webhooks/ {
        proxy_pass       http://127.0.0.1:3001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── Health check ─────────────────────────────────────────────
    location /health {
        proxy_pass http://127.0.0.1:3001;
    }

    # ── Logs ─────────────────────────────────────────────────────
    access_log /var/log/nginx/quadraja.access.log;
    error_log  /var/log/nginx/quadraja.error.log;
}
