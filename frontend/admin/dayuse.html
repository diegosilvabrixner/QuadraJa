<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QuadraJá Admin — Dayuse</title>
  <link rel="stylesheet" href="css/admin.css"/>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-logo"><div class="logo-icon">🏐</div><div><span>QuadraJá</span><small>Admin</small></div></div>
    <nav class="sidebar-nav">
      <div class="nav-section"><span class="nav-section-label">Principal</span></div>
      <a class="nav-item" data-page="dashboard.html" href="dashboard.html"><span class="icon">📊</span>Dashboard</a>
      <a class="nav-item" data-page="reservas.html" href="reservas.html"><span class="icon">📅</span>Reservas</a>
      <a class="nav-item" data-page="quadras.html" href="quadras.html"><span class="icon">🏐</span>Quadras</a>
      <a class="nav-item" data-page="dayuse.html" href="dayuse.html"><span class="icon">🌅</span>Dayuse</a>
      <div class="nav-section"><span class="nav-section-label">Loja</span></div>
      <a class="nav-item" data-page="produtos.html" href="produtos.html"><span class="icon">🛒</span>Produtos</a>
      <a class="nav-item" data-page="estoque.html" href="estoque.html"><span class="icon">📦</span>Estoque</a>
      <a class="nav-item" data-page="pedidos.html" href="pedidos.html"><span class="icon">🧾</span>Pedidos</a>
      <div class="nav-section"><span class="nav-section-label">Financeiro</span></div>
      <a class="nav-item" data-page="financeiro.html" href="financeiro.html"><span class="icon">💰</span>DRE / Despesas</a>
      <a class="nav-item" data-page="funcionarios.html" href="funcionarios.html"><span class="icon">👥</span>Funcionários</a>
      <div class="nav-section"><span class="nav-section-label">Config</span></div>
      <a class="nav-item" data-page="arena.html" href="arena.html"><span class="icon">⚙️</span>Arena</a>
      <a class="nav-item" data-page="feriados.html" href="feriados.html"><span class="icon">🗓️</span>Feriados</a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-avatar" id="sidebarAvatar">A</div>
      <div><div class="sidebar-user-name" id="sidebarUserName">Admin</div></div>
      <button class="sidebar-logout" onclick="adminLogout()" title="Sair">↩</button>
    </div>
  </aside>
  <main class="main">
    <div class="topbar">
      <span class="topbar-title">Dayuse</span>
      <div class="topbar-actions">
        <span class="topbar-arena" id="topbarArena"></span>
        <button class="btn btn-primary" onclick="abrirModal('modalDayuse');modoEdDayuse=null">+ Novo Dayuse</button>
      </div>
    </div>
    <div class="content">
      <div class="panel">
        <div class="table-wrap">
          <table>
            <thead><tr><th>Nome</th><th>Data</th><th>Horário</th><th>Valor/pessoa</th><th>Quadras</th><th>Status</th><th>Ações</th></tr></thead>
            <tbody id="dayuseTbody"><tr><td colspan="7" style="text-align:center;color:var(--text-muted)">Carregando...</td></tr></tbody>
          </table>
        </div>
      </div>
    </div>
  </main>

  <!-- Modal dayuse -->
  <div class="modal-backdrop" id="modalDayuse">
    <div class="modal">
      <div class="modal-header"><h3 id="modalDayuseTitle">Novo Dayuse</h3><button class="modal-close" onclick="fecharModal('modalDayuse')">✕</button></div>
      <div class="modal-body">
        <div class="form-group"><label class="form-label">Nome *</label><input class="form-control" id="dyNome" placeholder="Ex: Dayuse Tarde de Sábado"/></div>
        <div class="grid-2">
          <div class="form-group"><label class="form-label">Data *</label><input class="form-control" id="dyData" type="date"/></div>
          <div class="form-group"><label class="form-label">Valor por pessoa (R$) *</label><input class="form-control" id="dyValor" type="number" step="0.01" placeholder="20.00"/></div>
        </div>
        <div class="grid-2">
          <div class="form-group"><label class="form-label">Início *</label><input class="form-control" id="dyInicio" type="time" value="13:00"/></div>
          <div class="form-group"><label class="form-label">Fim *</label><input class="form-control" id="dyFim" type="time" value="18:00"/></div>
        </div>
        <div class="form-group"><label class="form-label">Máx. pessoas (opcional)</label><input class="form-control" id="dyMax" type="number" placeholder="Ilimitado"/></div>
        <div class="form-group"><label class="form-label">Quadras incluídas *</label><div id="dyQuadrasCheck" style="display:flex;flex-wrap:wrap;gap:8px;margin-top:6px"></div></div>
        <div class="form-group"><label class="form-label"><input type="checkbox" id="dyPopup" checked/> Exibir popup para clientes</label></div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-secondary" onclick="fecharModal('modalDayuse')">Cancelar</button>
        <button class="btn btn-primary" onclick="salvarDayuse()">Salvar</button>
      </div>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script src="js/admin-common.js"></script>
  <script src="js/dayuse.js"></script>
</body>
</html>
