<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QuadraJá Admin — Controle de Estoque</title>
  <link rel="stylesheet" href="css/admin.css"/>
</head>
<body>
    <aside class="sidebar">
    <div class="sidebar-logo"><div class="logo-icon">🏐</div><div><span>QuadraJá</span><small>Admin</small></div></div>
    <nav class="sidebar-nav">
      <div class="nav-section"><span class="nav-section-label">Principal</span></div>
      <a class="nav-item" data-page="dashboard.html"   href="dashboard.html"><span class="icon">📊</span>Dashboard</a>
      <a class="nav-item" data-page="reservas.html"    href="reservas.html"><span class="icon">📅</span>Reservas</a>
      <a class="nav-item" data-page="quadras.html"     href="quadras.html"><span class="icon">🏐</span>Quadras</a>
      <a class="nav-item" data-page="dayuse.html"      href="dayuse.html"><span class="icon">🌅</span>Dayuse</a>
      <div class="nav-section"><span class="nav-section-label">Loja</span></div>
      <a class="nav-item" data-page="produtos.html"    href="produtos.html"><span class="icon">🛒</span>Produtos</a>
      <a class="nav-item" data-page="estoque.html"     href="estoque.html"><span class="icon">📦</span>Estoque</a>
      <a class="nav-item" data-page="pedidos.html"     href="pedidos.html"><span class="icon">🧾</span>Pedidos</a>
      <div class="nav-section"><span class="nav-section-label">Financeiro</span></div>
      <a class="nav-item" data-page="financeiro.html"  href="financeiro.html"><span class="icon">💰</span>DRE / Despesas</a>
      <a class="nav-item" data-page="funcionarios.html" href="funcionarios.html"><span class="icon">👥</span>Funcionários</a>
      <div class="nav-section"><span class="nav-section-label">Config</span></div>
      <a class="nav-item" data-page="arena.html"       href="arena.html"><span class="icon">⚙️</span>Arena</a>
      <a class="nav-item" data-page="feriados.html"    href="feriados.html"><span class="icon">🗓️</span>Feriados</a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-avatar" id="sidebarAvatar">A</div>
      <div><div class="sidebar-user-name" id="sidebarUserName">Admin</div></div>
      <button class="sidebar-logout" onclick="adminLogout()" title="Sair">↩</button>
    </div>
  </aside>
  <main class="main">
    <div class="topbar">
      <span class="topbar-title">Controle de Estoque</span>
      <div class="topbar-actions"><span class="topbar-arena" id="topbarArena"></span></div>
    </div>
    <div class="content">

      <div class="panel">
        <div class="table-wrap">
          <table>
            <thead><tr><th>Produto</th><th>Estoque Atual</th><th>Mínimo</th><th>Situação</th><th>Última Movimentação</th><th>Ações</th></tr></thead>
            <tbody id="estoqueTbody"><tr><td colspan="6" style="text-align:center;color:var(--text-muted)">Carregando...</td></tr></tbody>
          </table>
        </div>
      </div>
      <div class="modal-backdrop" id="modalMovimento">
        <div class="modal">
          <div class="modal-header"><h3>Ajustar Estoque: <span id="movProdNome"></span></h3><button class="modal-close" onclick="fecharModal('modalMovimento')">✕</button></div>
          <div class="modal-body">
            <div class="form-group"><label class="form-label">Tipo *</label>
              <select class="form-control" id="movTipo">
                <option value="ENTRADA">Entrada (compra/recebimento)</option>
                <option value="SAIDA">Saída (descarte/uso)</option>
                <option value="AJUSTE">Ajuste de inventário</option>
                <option value="PERDA">Perda / Avaria</option>
              </select>
            </div>
            <div class="form-group"><label class="form-label">Quantidade *</label><input class="form-control" id="movQtd" type="number" min="1"/></div>
            <div class="form-group"><label class="form-label">Custo unitário (R$)</label><input class="form-control" id="movCusto" type="number" step="0.01" placeholder="Opcional"/></div>
            <div class="form-group"><label class="form-label">Motivo</label><input class="form-control" id="movMotivo" placeholder="Ex: Compra NF 001..."/></div>
          </div>
          <div class="modal-footer">
            <button class="btn btn-secondary" onclick="fecharModal('modalMovimento')">Cancelar</button>
            <button class="btn btn-primary" onclick="salvarMovimento()">Confirmar</button>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script src="../../js/api.js"></script>
  <script src="js/admin-common.js"></script>
  <script src="js/estoque.js"></script>
</body>
</html>
