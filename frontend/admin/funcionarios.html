<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QuadraJá Admin — Funcionários</title>
  <link rel="stylesheet" href="css/admin.css"/>
</head>
<body>
    <aside class="sidebar">
    <div class="sidebar-logo"><div class="logo-icon">🏐</div><div><span>QuadraJá</span><small>Admin</small></div></div>
    <nav class="sidebar-nav">
      <div class="nav-section"><span class="nav-section-label">Principal</span></div>
      <a class="nav-item" data-page="dashboard.html"   href="dashboard.html"><span class="icon">📊</span>Dashboard</a>
      <a class="nav-item" data-page="reservas.html"    href="reservas.html"><span class="icon">📅</span>Reservas</a>
      <a class="nav-item" data-page="quadras.html"     href="quadras.html"><span class="icon">🏐</span>Quadras</a>
      <a class="nav-item" data-page="dayuse.html"      href="dayuse.html"><span class="icon">🌅</span>Dayuse</a>
      <div class="nav-section"><span class="nav-section-label">Loja</span></div>
      <a class="nav-item" data-page="produtos.html"    href="produtos.html"><span class="icon">🛒</span>Produtos</a>
      <a class="nav-item" data-page="estoque.html"     href="estoque.html"><span class="icon">📦</span>Estoque</a>
      <a class="nav-item" data-page="pedidos.html"     href="pedidos.html"><span class="icon">🧾</span>Pedidos</a>
      <div class="nav-section"><span class="nav-section-label">Financeiro</span></div>
      <a class="nav-item" data-page="financeiro.html"  href="financeiro.html"><span class="icon">💰</span>DRE / Despesas</a>
      <a class="nav-item" data-page="funcionarios.html" href="funcionarios.html"><span class="icon">👥</span>Funcionários</a>
      <div class="nav-section"><span class="nav-section-label">Config</span></div>
      <a class="nav-item" data-page="arena.html"       href="arena.html"><span class="icon">⚙️</span>Arena</a>
      <a class="nav-item" data-page="feriados.html"    href="feriados.html"><span class="icon">🗓️</span>Feriados</a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-avatar" id="sidebarAvatar">A</div>
      <div><div class="sidebar-user-name" id="sidebarUserName">Admin</div></div>
      <button class="sidebar-logout" onclick="adminLogout()" title="Sair">↩</button>
    </div>
  </aside>
  <main class="main">
    <div class="topbar">
      <span class="topbar-title">Funcionários</span>
      <div class="topbar-actions"><span class="topbar-arena" id="topbarArena"></span></div>
    </div>
    <div class="content">

      <div style="display:flex;justify-content:flex-end;margin-bottom:16px">
        <button class="btn btn-primary" onclick="abrirModal('modalFunc');modoEdFunc=null">+ Novo Funcionário</button>
      </div>
      <div class="kpi-grid" id="kpiFolha"></div>
      <div class="panel mt-16">
        <div class="table-wrap">
          <table>
            <thead><tr><th>Nome</th><th>Cargo</th><th>Salário</th><th>Encargos</th><th>Benefícios</th><th>Custo Total</th><th>Status</th><th>Ações</th></tr></thead>
            <tbody id="funcTbody"></tbody>
          </table>
        </div>
      </div>
      <div class="modal-backdrop" id="modalFunc">
        <div class="modal">
          <div class="modal-header"><h3 id="modalFuncTitle">Novo Funcionário</h3><button class="modal-close" onclick="fecharModal('modalFunc')">✕</button></div>
          <div class="modal-body">
            <div class="form-group"><label class="form-label">Nome *</label><input class="form-control" id="fNome"/></div>
            <div class="grid-2">
              <div class="form-group"><label class="form-label">Cargo *</label><input class="form-control" id="fCargo" placeholder="Gerente, Atendente..."/></div>
              <div class="form-group"><label class="form-label">Status</label>
                <select class="form-control" id="fStatus"><option value="ATIVO">Ativo</option><option value="FERIAS">Férias</option><option value="AFASTADO">Afastado</option><option value="DESLIGADO">Desligado</option></select>
              </div>
            </div>
            <div class="grid-2">
              <div class="form-group"><label class="form-label">Salário base (R$) *</label><input class="form-control" id="fSalario" type="number" step="0.01"/></div>
              <div class="form-group"><label class="form-label">Data de admissão</label><input class="form-control" id="fAdmissao" type="date"/></div>
            </div>
            <div class="grid-2">
              <div class="form-group"><label class="form-label">Vale Transporte (R$)</label><input class="form-control" id="fVT" type="number" step="0.01" value="0"/></div>
              <div class="form-group"><label class="form-label">Vale Refeição (R$)</label><input class="form-control" id="fVR" type="number" step="0.01" value="0"/></div>
            </div>
          </div>
          <div class="modal-footer">
            <button class="btn btn-secondary" onclick="fecharModal('modalFunc')">Cancelar</button>
            <button class="btn btn-primary" onclick="salvarFuncionario()">Salvar</button>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script src="../../js/api.js"></script>
  <script src="js/admin-common.js"></script>
  <script src="js/funcionarios.js"></script>
</body>
</html>
