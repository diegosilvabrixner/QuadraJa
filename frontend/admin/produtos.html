<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QuadraJá Admin — Produtos</title>
  <link rel="stylesheet" href="css/admin.css"/>
</head>
<body>
    <aside class="sidebar">
    <div class="sidebar-logo"><div class="logo-icon">🏐</div><div><span>QuadraJá</span><small>Admin</small></div></div>
    <nav class="sidebar-nav">
      <div class="nav-section"><span class="nav-section-label">Principal</span></div>
      <a class="nav-item" data-page="dashboard.html"   href="dashboard.html"><span class="icon">📊</span>Dashboard</a>
      <a class="nav-item" data-page="reservas.html"    href="reservas.html"><span class="icon">📅</span>Reservas</a>
      <a class="nav-item" data-page="quadras.html"     href="quadras.html"><span class="icon">🏐</span>Quadras</a>
      <a class="nav-item" data-page="dayuse.html"      href="dayuse.html"><span class="icon">🌅</span>Dayuse</a>
      <div class="nav-section"><span class="nav-section-label">Loja</span></div>
      <a class="nav-item" data-page="produtos.html"    href="produtos.html"><span class="icon">🛒</span>Produtos</a>
      <a class="nav-item" data-page="estoque.html"     href="estoque.html"><span class="icon">📦</span>Estoque</a>
      <a class="nav-item" data-page="pedidos.html"     href="pedidos.html"><span class="icon">🧾</span>Pedidos</a>
      <div class="nav-section"><span class="nav-section-label">Financeiro</span></div>
      <a class="nav-item" data-page="financeiro.html"  href="financeiro.html"><span class="icon">💰</span>DRE / Despesas</a>
      <a class="nav-item" data-page="funcionarios.html" href="funcionarios.html"><span class="icon">👥</span>Funcionários</a>
      <div class="nav-section"><span class="nav-section-label">Config</span></div>
      <a class="nav-item" data-page="arena.html"       href="arena.html"><span class="icon">⚙️</span>Arena</a>
      <a class="nav-item" data-page="feriados.html"    href="feriados.html"><span class="icon">🗓️</span>Feriados</a>
    </nav>
    <div class="sidebar-footer">
      <div class="sidebar-avatar" id="sidebarAvatar">A</div>
      <div><div class="sidebar-user-name" id="sidebarUserName">Admin</div></div>
      <button class="sidebar-logout" onclick="adminLogout()" title="Sair">↩</button>
    </div>
  </aside>
  <main class="main">
    <div class="topbar">
      <span class="topbar-title">Produtos</span>
      <div class="topbar-actions"><span class="topbar-arena" id="topbarArena"></span></div>
    </div>
    <div class="content">

      <div style="display:flex;justify-content:flex-end;margin-bottom:16px">
        <button class="btn btn-primary" onclick="abrirModal('modalProduto');modoEd=null">+ Novo Produto</button>
      </div>
      <div class="panel">
        <div class="table-wrap">
          <table>
            <thead><tr><th>Produto</th><th>Categoria</th><th>Custo</th><th>Markup</th><th>Venda</th><th>Estoque</th><th>Status</th><th>Ações</th></tr></thead>
            <tbody id="produtosTbody"><tr><td colspan="8" style="text-align:center;color:var(--text-muted)">Carregando...</td></tr></tbody>
          </table>
        </div>
      </div>
      <div class="modal-backdrop" id="modalProduto">
        <div class="modal">
          <div class="modal-header"><h3 id="modalProdutoTitle">Novo Produto</h3><button class="modal-close" onclick="fecharModal('modalProduto')">✕</button></div>
          <div class="modal-body">
            <div class="form-group"><label class="form-label">Nome *</label><input class="form-control" id="pNome"/></div>
            <div class="grid-2">
              <div class="form-group"><label class="form-label">Custo (R$) *</label><input class="form-control" id="pCusto" type="number" step="0.01" oninput="calcPrecoVenda()"/></div>
              <div class="form-group"><label class="form-label">Markup (%) *</label><input class="form-control" id="pMarkup" type="number" value="100" oninput="calcPrecoVenda()"/></div>
            </div>
            <div class="form-group"><label class="form-label">Preço de venda</label><input class="form-control" id="pVenda" readonly style="background:var(--bg);color:var(--accent);font-weight:700"/></div>
            <div class="grid-2">
              <div class="form-group"><label class="form-label">Estoque inicial</label><input class="form-control" id="pEstoque" type="number" value="0"/></div>
              <div class="form-group"><label class="form-label">Estoque mínimo</label><input class="form-control" id="pEstoqueMin" type="number" value="5"/></div>
            </div>
            <div class="form-group"><label class="form-label">Unidade</label><select class="form-control" id="pUnidade"><option>un</option><option>ml</option><option>g</option><option>kg</option></select></div>
            <div class="form-group"><label class="form-label"><input type="checkbox" id="pVisivel" checked/> Visível para clientes</label></div>
          </div>
          <div class="modal-footer">
            <button class="btn btn-secondary" onclick="fecharModal('modalProduto')">Cancelar</button>
            <button class="btn btn-primary" onclick="salvarProduto()">Salvar</button>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script src="../../js/api.js"></script>
  <script src="js/admin-common.js"></script>
  <script src="js/produtos.js"></script>
</body>
</html>
