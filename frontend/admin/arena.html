<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QuadraJá Admin — Arena</title>
  <link rel="stylesheet" href="css/admin.css"/>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-logo"><div class="logo-icon">🏐</div><div><span>QuadraJá</span><small>Admin</small></div></div>
    <nav class="sidebar-nav"><div class="nav-section"><span class="nav-section-label">Principal</span></div>
      <a class="nav-item" data-page="dashboard.html" href="dashboard.html"><span class="icon">📊</span>Dashboard</a>
      <a class="nav-item" data-page="reservas.html" href="reservas.html"><span class="icon">📅</span>Reservas</a>
      <a class="nav-item" data-page="quadras.html" href="quadras.html"><span class="icon">🏐</span>Quadras</a>
      <a class="nav-item" data-page="dayuse.html" href="dayuse.html"><span class="icon">🌅</span>Dayuse</a>
      <div class="nav-section"><span class="nav-section-label">Loja</span></div>
      <a class="nav-item" data-page="produtos.html" href="produtos.html"><span class="icon">🛒</span>Produtos</a>
      <a class="nav-item" data-page="estoque.html" href="estoque.html"><span class="icon">📦</span>Estoque</a>
      <a class="nav-item" data-page="pedidos.html" href="pedidos.html"><span class="icon">🧾</span>Pedidos</a>
      <div class="nav-section"><span class="nav-section-label">Financeiro</span></div>
      <a class="nav-item" data-page="financeiro.html" href="financeiro.html"><span class="icon">💰</span>DRE / Despesas</a>
      <a class="nav-item" data-page="funcionarios.html" href="funcionarios.html"><span class="icon">👥</span>Funcionários</a>
      <div class="nav-section"><span class="nav-section-label">Config</span></div>
      <a class="nav-item" data-page="arena.html" href="arena.html"><span class="icon">⚙️</span>Arena</a>
      <a class="nav-item" data-page="feriados.html" href="feriados.html"><span class="icon">🗓️</span>Feriados</a></nav>
    <div class="sidebar-footer">
      <div class="sidebar-avatar" id="sidebarAvatar">A</div>
      <div><div class="sidebar-user-name" id="sidebarUserName">Admin</div></div>
      <button class="sidebar-logout" onclick="adminLogout()" title="Sair">↩</button>
    </div>
  </aside>
  <main class="main">
    <div class="topbar"><span class="topbar-title">Configurações da Arena</span>
      <div class="topbar-actions"><span class="topbar-arena" id="topbarArena"></span>
        <button class="btn btn-primary" onclick="salvarArena()">💾 Salvar</button>
      </div>
    </div>
    <div class="content">
      <div class="grid-2">
        <div class="panel">
          <div class="panel-header"><span class="panel-title">Informações gerais</span></div>
          <div class="form-group"><label class="form-label">Nome da arena</label><input class="form-control" id="aNome"/></div>
          <div class="form-group"><label class="form-label">Telefone</label><input class="form-control" id="aTelefone"/></div>
          <div class="form-group"><label class="form-label">E-mail</label><input class="form-control" id="aEmail" type="email"/></div>
          <div class="form-group"><label class="form-label">Endereço</label><input class="form-control" id="aEndereco"/></div>
          <div class="grid-2">
            <div class="form-group"><label class="form-label">Cidade</label><input class="form-control" id="aCidade"/></div>
            <div class="form-group"><label class="form-label">Estado</label><input class="form-control" id="aEstado" maxlength="2"/></div>
          </div>
        </div>
        <div class="panel">
          <div class="panel-header"><span class="panel-title">Regras de agendamento</span></div>
          <div class="grid-2">
            <div class="form-group"><label class="form-label">Abertura padrão</label><input class="form-control" id="aAbertura" type="time"/></div>
            <div class="form-group"><label class="form-label">Fechamento padrão</label><input class="form-control" id="aFechamento" type="time"/></div>
          </div>
          <div class="grid-2">
            <div class="form-group"><label class="form-label">Antecedência mínima (h)</label><input class="form-control" id="aAntecedMin" type="number" min="0"/></div>
            <div class="form-group"><label class="form-label">Cancelamento (h)</label><input class="form-control" id="aCancelH" type="number" min="0"/></div>
          </div>
          <div class="form-group">
            <label class="form-label"><input type="checkbox" id="aProdutos"/> Habilitar venda de produtos</label>
          </div>
          <div class="form-group">
            <label class="form-label"><input type="checkbox" id="aDayuse"/> Habilitar dayuse</label>
          </div>
        </div>
      </div>
    </div>
  </main>
  <script src="../js/api.js"></script>
  <script src="js/admin-common.js"></script>
  <script src="js/arena-config.js"></script>
</body>
</html>
