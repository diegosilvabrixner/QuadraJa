<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QuadraJá — Quadras</title>
  <link rel="stylesheet" href="../css/shared.css"/>
  <link rel="stylesheet" href="../css/quadras.css"/>
</head>
<body>
  <div class="page page-top">

    <div class="header fade-up">
      <button class="btn-back" onclick="window.location.href='locais.html'">←</button>
      <div class="header-texts">
        <h2 id="arenaTitle">Arena</h2>
        <p>Escolha sua quadra</p>
      </div>
    </div>

    <div class="screen">
      <div class="plan-wrap fade-up-1">
        <p class="section-label">Planta da arena</p>
        <div class="floor-plan">
          <!-- SVG populado dinamicamente pelo quadras.js -->
          <svg id="floorPlan" viewBox="0 0 300 180" xmlns="http://www.w3.org/2000/svg" style="width:100%;height:auto">
            <g id="svgCells"></g>
          </svg>
        </div>
        <div class="plan-legend">
          <span class="legend-item available">● Livre</span>
          <span class="legend-item occupied">● Ocupada</span>
          <span class="legend-item maintenance">● Manutenção</span>
        </div>
      </div>

      <p class="section-label fade-up-2" style="margin-top:20px">Todas as quadras</p>
      <div class="court-list fade-up-2" id="courtList">
        <!-- Populado dinamicamente pelo quadras.js -->
      </div>
    </div>

  </div>
  <script src="../js/api.js"></script>
  <script src="../js/quadras.js"></script>
</body>
</html>
